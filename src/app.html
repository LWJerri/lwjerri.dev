<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" />
    <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.ico" />
    <meta name="apple-mobile-web-app-title" content="LWJerri" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0C0E10" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!--
      I'm ignore this lines, because Vercel (and probably search engines)
      can't correct detect this meta's and I see errors in "Open Graph".
    -->

    <!-- prettier-ignore -->
    <meta name="keywords" content="LWJerri, lwjerri, lwjerri.github.io, lwjerri.js.org, lwjerri.dev, Джерри, Джеррі, Andrii Zontov, Андрей Зонтов, Андрій Зонтов" />

    <meta name="author" content="LWJerri, hello@lwjerri.dev" />
    <meta name="reply-to" content="hello@lwjerri.dev" />
    <meta name="url" content="https://lwjerri.dev" />
    <meta name="identifier-URL" content="https://lwjerri.dev" />
    <meta name="revisit-after" content="7 days" />

    <link rel="preload" href="/fonts/ibm-plex-mono-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />

    %sveltekit.head%
  </head>

  <body data-sveltekit-preload-data="hover" class="scrollbar">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
